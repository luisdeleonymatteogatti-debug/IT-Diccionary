        .alphabet-grid a,
        .alphabet-gridLong a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        .alphabet-grid a:hover h2,
        .alphabet-gridLong a:hover h2 {
            background: rgb(170, 170, 170);
            color: #1014ff;
        }
